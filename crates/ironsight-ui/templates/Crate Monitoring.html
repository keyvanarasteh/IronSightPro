<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronSight | Memory Forensics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dependencies: Loading React first, then dependencies, then Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.2/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@0.344.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .scanline {
            width: 100%;
            height: 1px;
            background: rgba(34, 197, 94, 0.1);
            position: absolute;
            top: 0;
            z-index: 10;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>

<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Ensure LucideReact is available globally from the UMD bundle
        const {
            Shield, Activity, Search, AlertTriangle, Layers, Clock,
            Cpu, Database, Terminal, ChevronRight, Binary, Fingerprint,
            RefreshCw, Eye, Settings, Info, Bell
        } = window.LucideReact || {};

        // Fallback component if icons fail to load
        const IconPlaceholder = ({ className }) => <div className={`w-5 h-5 bg-slate-700 rounded ${className}`} />;

        const {
            BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer,
            Cell, PieChart, Pie
        } = window.Recharts || {};

        // --- Mock Data Generators ---
        const generateMockRegions = () => {
            const basenames = ["/usr/bin/daemon", "[stack]", "[heap]", "/lib/libc.so", "/lib/ld.so", null, null];
            const regions = [];
            let currentAddr = 0x550000000000;

            for (let i = 0; i < 25; i++) {
                const size = Math.floor(Math.random() * 0x10000) * 0x10;
                const path = basenames[Math.floor(Math.random() * basenames.length)];
                const isExec = Math.random() > 0.8;
                const isWrite = Math.random() > 0.4;
                const isRead = true;

                regions.push({
                    start: currentAddr,
                    end: currentAddr + size,
                    permissions: {
                        read: isRead,
                        write: isWrite,
                        execute: isExec,
                        shared: Math.random() > 0.9
                    },
                    pathname: path,
                    inode: Math.floor(Math.random() * 1000000)
                });
                currentAddr += size + (Math.random() * 0x2000);
            }
            return regions;
        };

        const MOCK_SCANNER_RESULTS = [
            { offset: 0x7f8a123045, matched_text: "/bin/sh", context: "72 65 61 64 20 | read . . . /bin/sh . .", severity: "high" },
            { offset: 0x7f8a125010, matched_text: "nc -lp", context: "20 2d 6c 70 | . . nc -lp . .", severity: "critical" },
            { offset: 0x55a123e400, matched_text: "BEGIN RSA PRIVATE KEY", context: "42 45 47 49 4e | BEGIN RSA . . .", severity: "medium" },
        ];

        const MOCK_CHANGES = [
            { type: 'PermissionChanged', start: 0x7f8a100000, old_perms: 'rw-p', new_perms: 'rwxp', time: '2m ago' },
            { type: 'RegionAdded', start: 0x55b1200000, permissions: 'r-xp', pathname: null, time: '5m ago' },
            { type: 'SizeChanged', start: 0x55a2e4c000, old_size: 135168, new_size: 270336, time: '12m ago' },
        ];

        // --- Components ---

        const StatCard = ({ title, value, sub, icon: Icon, colorClass, status }) => (
            <div className="glass-panel p-5 rounded-xl flex flex-col justify-between hover:border-slate-400 transition-all duration-300">
                <div className="flex justify-between items-start">
                    <div className={`p-2 rounded-lg ${colorClass} bg-opacity-10`}>
                        {Icon ? <Icon className={`w-5 h-5 ${colorClass.replace('bg-', 'text-')}`} /> : <IconPlaceholder />}
                    </div>
                    {status && (
                        <span className={`flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider ${status === 'active' ? 'text-green-500' : 'text-slate-500'}`}>
                            <span className={`w-1.5 h-1.5 rounded-full ${status === 'active' ? 'bg-green-500 status-pulse' : 'bg-slate-500'}`}></span>
                            {status}
                        </span>
                    )}
                </div>
                <div className="mt-4">
                    <h3 className="text-slate-400 text-xs font-medium uppercase tracking-tight">{title}</h3>
                    <div className="flex items-baseline gap-2">
                        <span className="text-2xl font-bold mono tracking-tight text-white">{value}</span>
                        {sub && <span className="text-[10px] text-slate-500 font-mono">{sub}</span>}
                    </div>
                </div>
            </div>
        );

        const MemoryVisualizer = ({ regions }) => {
            const maxAddr = Math.max(...regions.map(r => r.end));
            const minAddr = Math.min(...regions.map(r => r.start));
            const range = maxAddr - minAddr;

            return (
                <div className="glass-panel p-6 rounded-xl overflow-hidden relative">
                    <div className="flex items-center justify-between mb-6">
                        <div className="flex items-center gap-2">
                            {Layers ? <Layers className="w-4 h-4 text-blue-400" /> : <IconPlaceholder className="w-4 h-4" />}
                            <h2 className="text-sm font-semibold uppercase tracking-wider text-slate-200">Memory Map (PID 2491)</h2>
                        </div>
                        <div className="flex gap-4 text-[10px] uppercase font-bold text-slate-500">
                            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-500"></span> Read</div>
                            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span> Write</div>
                            <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> Exec</div>
                        </div>
                    </div>
                    <div className="relative h-24 w-full bg-slate-900 rounded-lg flex items-center p-1 border border-slate-800">
                        {regions.map((r, i) => {
                            const width = ((r.end - r.start) / range) * 100;
                            const left = ((r.start - minAddr) / range) * 100;
                            let color = 'bg-blue-500';
                            if (r.permissions.execute && r.permissions.write) color = 'bg-orange-500';
                            else if (r.permissions.execute) color = 'bg-green-500';
                            else if (r.permissions.write) color = 'bg-red-500';

                            return (
                                <div
                                    key={i}
                                    className={`absolute h-16 rounded-sm opacity-80 hover:opacity-100 transition-opacity cursor-pointer group ${color}`}
                                    style={{ left: `${left}%`, width: `${Math.max(width, 0.2)}%` }}
                                >
                                    <div className="invisible group-hover:visible absolute bottom-full mb-2 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
                                        <div className="bg-slate-950 text-[10px] p-2 rounded border border-slate-700 whitespace-nowrap shadow-xl">
                                            <div className="mono font-bold text-blue-400">0x{r.start.toString(16)}</div>
                                            <div className="text-slate-300">Size: {((r.end - r.start) / 1024).toFixed(2)} KB</div>
                                            <div className="text-slate-400 italic">{r.pathname || 'anonymous'}</div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    <div className="flex justify-between mt-2 px-1 mono text-[10px] text-slate-600">
                        <span>0x{minAddr.toString(16)}</span>
                        <span>0x{maxAddr.toString(16)}</span>
                    </div>
                </div>
            );
        };

        const ChangeFeed = ({ changes }) => (
            <div className="glass-panel rounded-xl flex flex-col h-full overflow-hidden">
                <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                        {Clock ? <Clock className="w-4 h-4 text-amber-400" /> : <IconPlaceholder className="w-4 h-4" />}
                        <h2 className="text-sm font-semibold uppercase tracking-wider">Memory Watcher</h2>
                    </div>
                    <button className="text-xs text-slate-400 hover:text-white flex items-center gap-1">
                        View All {ChevronRight ? <ChevronRight className="w-3 h-3" /> : null}
                    </button>
                </div>
                <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-4">
                    {changes.map((c, i) => (
                        <div key={i} className="flex gap-3 relative group">
                            {i < changes.length - 1 && <div className="absolute left-[11px] top-6 w-[1px] h-full bg-slate-800"></div>}
                            <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 z-10 
                                ${c.type === 'RegionAdded' ? 'bg-green-500/20 text-green-500' :
                                    c.type === 'PermissionChanged' ? 'bg-amber-500/20 text-amber-500' :
                                        'bg-blue-500/20 text-blue-500'}`}>
                                {Activity ? <Activity className="w-3 h-3" /> : null}
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="flex justify-between items-start">
                                    <p className="text-xs font-bold text-slate-200 uppercase tracking-tight">{c.type.replace(/([A-Z])/g, ' $1')}</p>
                                    <span className="text-[10px] text-slate-500 mono">{c.time}</span>
                                </div>
                                <p className="text-[11px] text-slate-400 mt-0.5 truncate mono">
                                    @ 0x{c.start.toString(16)}
                                    {c.new_perms && <span className="text-amber-400 ml-2">[{c.old_perms} → {c.new_perms}]</span>}
                                </p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const ScannerResults = ({ results }) => (
            <div className="glass-panel rounded-xl flex flex-col h-full overflow-hidden">
                <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                        {Binary ? <Binary className="w-4 h-4 text-emerald-400" /> : <IconPlaceholder className="w-4 h-4" />}
                        <h2 className="text-sm font-semibold uppercase tracking-wider">Pattern Scanner</h2>
                    </div>
                    <div className="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-500 text-[10px] font-bold border border-emerald-500/20">
                        LIVE
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto custom-scrollbar">
                    <table className="w-full text-left text-xs border-collapse">
                        <thead className="sticky top-0 bg-slate-900 text-slate-500 font-medium uppercase tracking-tighter border-b border-slate-800 z-20">
                            <tr>
                                <th className="p-3">Offset</th>
                                <th className="p-3">Matched</th>
                                <th className="p-3">Context</th>
                            </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-800">
                            {results.map((r, i) => (
                                <tr key={i} className="group hover:bg-slate-800/30 transition-colors">
                                    <td className="p-3 mono text-blue-400 font-medium">0x{r.offset.toString(16)}</td>
                                    <td className="p-3">
                                        <span className={`px-1.5 py-0.5 rounded text-[10px] font-bold border 
                                            ${r.severity === 'critical' ? 'bg-red-500/10 text-red-500 border-red-500/30' :
                                                r.severity === 'high' ? 'bg-orange-500/10 text-orange-500 border-orange-500/30' :
                                                    'bg-blue-500/10 text-blue-500 border-blue-500/30'}`}>
                                            {r.matched_text}
                                        </span>
                                    </td>
                                    <td className="p-3 mono text-slate-500 text-[10px] max-w-[200px] truncate">{r.context}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const App = () => {
            const [regions, setRegions] = useState(generateMockRegions());
            const [scannerResults, setScannerResults] = useState(MOCK_SCANNER_RESULTS);
            const [changes, setChanges] = useState(MOCK_CHANGES);
            const [isScanning, setIsScanning] = useState(false);

            const summary = useMemo(() => {
                const wx = regions.filter(r => r.permissions.write && r.permissions.execute).length;
                const totalSize = regions.reduce((acc, r) => acc + (r.end - r.start), 0);
                return {
                    wxCount: wx,
                    totalRegions: regions.length,
                    totalSizeMiB: (totalSize / (1024 * 1024)).toFixed(2),
                    execCount: regions.filter(r => r.permissions.execute).length
                };
            }, [regions]);

            const runScan = () => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    // Add a new random match
                    const newMatch = {
                        offset: 0x7f8a000000 + Math.floor(Math.random() * 0xffffff),
                        matched_text: "powershell",
                        context: "70 6f 77 65 72 | power . . . shell",
                        severity: "high"
                    };
                    setScannerResults(prev => [newMatch, ...prev]);
                }, 1500);
            };

            return (
                <div className="min-h-screen p-4 lg:p-8 flex flex-col gap-6 relative">
                    <div className="scanline"></div>

                    {/* Header */}
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                                {Shield ? <Shield className="text-white w-7 h-7" /> : <IconPlaceholder className="w-7 h-7" />}
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tighter text-white uppercase italic">IronSight</h1>
                                <p className="text-xs text-slate-500 font-medium tracking-widest uppercase">Memory Forensics Engine</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="relative">
                                {Search ? <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" /> : null}
                                <input
                                    type="text"
                                    placeholder="SEARCH PID / PROCESS..."
                                    className="bg-slate-900/50 border border-slate-700 rounded-lg pl-9 pr-4 py-2 text-xs mono focus:outline-none focus:border-blue-500 w-64 transition-all"
                                />
                            </div>
                            <button className="p-2 rounded-lg bg-slate-900 border border-slate-700 text-slate-400 hover:text-white hover:border-slate-500">
                                {Bell ? <Bell className="w-5 h-5" /> : null}
                            </button>
                            <button
                                onClick={runScan}
                                className={`flex items-center gap-2 px-4 py-2 rounded-lg bg-blue-600 text-white text-xs font-bold uppercase tracking-wider hover:bg-blue-500 transition-all ${isScanning ? 'animate-pulse' : ''}`}
                            >
                                {isScanning ? (RefreshCw ? <RefreshCw className="w-4 h-4 animate-spin" /> : null) : (Terminal ? <Terminal className="w-4 h-4" /> : null)}
                                {isScanning ? 'Scanning...' : 'Manual Scan'}
                            </button>
                        </div>
                    </header>

                    {/* Dashboard Stats */}
                    <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard
                            title="Total Regions"
                            value={summary.totalRegions}
                            sub="mapped"
                            icon={Layers}
                            colorClass="bg-blue-500"
                            status="active"
                        />
                        <StatCard
                            title="W^X Violations"
                            value={summary.wxCount}
                            sub="security risks"
                            icon={AlertTriangle}
                            colorClass={summary.wxCount > 0 ? "bg-red-500" : "bg-green-500"}
                            status={summary.wxCount > 0 ? "critical" : "clean"}
                        />
                        <StatCard
                            title="Exec Regions"
                            value={summary.execCount}
                            sub={`~${(summary.execCount / summary.totalRegions * 100).toFixed(0)}% of total`}
                            icon={Cpu}
                            colorClass="bg-emerald-500"
                        />
                        <StatCard
                            title="Total VirtMem"
                            value={`${summary.totalSizeMiB}`}
                            sub="MiB"
                            icon={Database}
                            colorClass="bg-purple-500"
                        />
                    </section>

                    {/* Main Content Grid */}
                    <main className="grid grid-cols-1 xl:grid-cols-12 gap-6 flex-1">

                        {/* Left Column: Visualizer & Results */}
                        <div className="xl:col-span-8 flex flex-col gap-6">
                            <MemoryVisualizer regions={regions} />

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-1 h-[400px]">
                                <ScannerResults results={scannerResults} />
                                <div className="glass-panel rounded-xl overflow-hidden flex flex-col">
                                    <div className="p-4 border-b border-slate-800 flex items-center gap-2">
                                        {Info ? <Info className="w-4 h-4 text-blue-400" /> : null}
                                        <h2 className="text-sm font-semibold uppercase tracking-wider">Region Analysis</h2>
                                    </div>
                                    <div className="flex-1 p-2">
                                        {ResponsiveContainer ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={[
                                                    { name: 'R--', count: regions.filter(r => r.permissions.read && !r.permissions.write && !r.permissions.execute).length },
                                                    { name: 'RW-', count: regions.filter(r => r.permissions.read && r.permissions.write && !r.permissions.execute).length },
                                                    { name: 'R-X', count: regions.filter(r => r.permissions.read && !r.permissions.write && r.permissions.execute).length },
                                                    { name: 'RWX', count: regions.filter(r => r.permissions.write && r.permissions.execute).length },
                                                ]}>
                                                    <XAxis dataKey="name" stroke="#64748b" fontSize={10} axisLine={false} tickLine={false} />
                                                    <Tooltip
                                                        contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #334155', borderRadius: '8px' }}
                                                        itemStyle={{ color: '#fff', fontSize: '12px' }}
                                                    />
                                                    <Bar dataKey="count" radius={[4, 4, 0, 0]}>
                                                        {[0, 1, 2, 3].map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={['#3b82f6', '#f59e0b', '#10b981', '#ef4444'][index]} />
                                                        ))}
                                                    </Bar>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        ) : <div className="flex items-center justify-center h-full text-slate-500 uppercase text-[10px] font-bold">Chart loading...</div>}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Column: Watcher & Details */}
                        <div className="xl:col-span-4 flex flex-col gap-6">
                            <ChangeFeed changes={changes} />

                            <div className="glass-panel p-5 rounded-xl flex-1">
                                <h2 className="text-sm font-semibold uppercase tracking-wider mb-4 flex items-center gap-2">
                                    {Fingerprint ? <Fingerprint className="w-4 h-4 text-purple-400" /> : null}
                                    Process Metadata
                                </h2>
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800/50">
                                        <span className="text-xs text-slate-500 uppercase">PID</span>
                                        <span className="text-xs mono font-bold text-white">2491</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800/50">
                                        <span className="text-xs text-slate-500 uppercase">User</span>
                                        <span className="text-xs mono font-bold text-white">root</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800/50">
                                        <span className="text-xs text-slate-500 uppercase">Architecture</span>
                                        <span className="text-xs mono font-bold text-white">x86_64</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2 border-b border-slate-800/50">
                                        <span className="text-xs text-slate-500 uppercase">Threads</span>
                                        <span className="text-xs mono font-bold text-white">14</span>
                                    </div>
                                    <div className="pt-4">
                                        <div className="bg-red-500/10 border border-red-500/20 p-3 rounded-lg flex gap-3">
                                            {AlertTriangle ? <AlertTriangle className="w-4 h-4 text-red-500 shrink-0" /> : null}
                                            <div>
                                                <p className="text-[10px] font-bold text-red-500 uppercase">Security Alert</p>
                                                <p className="text-[10px] text-slate-400 leading-tight mt-1">
                                                    W^X violation detected in anonymous region. This is highly indicative of shellcode injection or JIT vulnerabilities.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer / Connection Status */}
                    <footer className="mt-auto flex justify-between items-center text-[10px] text-slate-500 uppercase tracking-widest font-bold">
                        <div className="flex gap-6">
                            <span>AGENT_VERSION: 1.2.4-BETA</span>
                            <span>NODE_ID: IS-PROD-01</span>
                            <span>LAST_SYNC: JUST NOW</span>
                        </div>
                        <div className="flex items-center gap-2 text-green-500">
                            <span className="w-2 h-2 rounded-full bg-green-500 status-pulse"></span>
                            SYSTEMS NOMINAL
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
